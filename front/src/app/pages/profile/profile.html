<div style="padding: 20px;">
  <h2>Mi Perfil</h2>

  @if (user) {
    <p><strong>ID:</strong> {{ user.id }}</p>
    <p><strong>Nombre:</strong> {{ user.name }}</p>
    <p><strong>Email:</strong> {{ user.email }}</p>

    <button (click)="logout()" style="background-color: red; color: white;">
      Cerrar Sesión
    </button>
  } @else {
    <p>Cargando datos...</p>
  }
</div>
